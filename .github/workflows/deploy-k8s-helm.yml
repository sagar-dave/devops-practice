name: Build Image and Update Dev Values

on:
  push:
    branches: [ main ]

jobs:
  build-and-update-dev:
    if: "!contains(github.event.head_commit.message, 'Update dev image tag')"
    runs-on: ubuntu-latest

    env:
      IMAGE_REPOSITORY: sagardave/devops-practice
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: docker build -t $IMAGE_REPOSITORY:$IMAGE_TAG .

      - name: Push Image
        run: docker push $IMAGE_REPOSITORY:$IMAGE_TAG

      - name: Update dev values.yaml image tag
        run: |
          sed -i 's|tag: .*|tag: '"$IMAGE_TAG"'|' environments/dev/values.yaml

      - name: Show updated dev values
        run: cat environments/dev/values.yaml

      - name: Commit updated dev values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add environments/dev/values.yaml
          git diff --cached --quiet || git commit -m "Update dev image tag to $IMAGE_TAG"
          git push